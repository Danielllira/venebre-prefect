# Official Prefect 3.x Self-Hosted Documentation:
# https://docs.prefect.io/v3/deploy/infrastructure-examples/docker-compose
# Self-hosted Prefect control plane for Venebre pipelines.

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=prefect
      - POSTGRES_PASSWORD=prefect
      - POSTGRES_DB=prefect
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3.6.29-python3.13
    restart: always
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      - PREFECT_API_URL=http://127.0.0.1:4200/api
      - PREFECT_UI_API_URL=https://pipelines.venebre.com/api
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4200/api/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker-stg:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    command: prefect worker start --pool "cloud-run-stg" --type "cloud-run"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      prefect-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://prefect-server:4200/api/health', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker-prod:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    command: prefect worker start --pool "cloud-run-prod" --type "cloud-run"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      prefect-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://prefect-server:4200/api/health', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro 
    depends_on:
      prefect-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
