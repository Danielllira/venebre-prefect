# Ref: https://docs.prefect.io/v3/deploy/infrastructure-examples/docker-compose

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prefect
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - shared-network

  prefect-server:
    image: prefecthq/prefect:3.6.29-python3.13
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_UI_API_URL: https://pipelines.venebre.com/api
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${POSTGRES_PASSWORD}@postgres:5432/prefect
      # https://docs.prefect.io/v3/advanced/security-settings#basic-authentication
      PREFECT_SERVER_API_AUTH_STRING: "prefect:${PREFECT_API_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - prefect-data:/root/.prefect
    restart: unless-stopped
    networks:
      - shared-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - prefect-server
    restart: unless-stopped
    networks:
      - shared-network

volumes:
  postgres-data:
  prefect-data:

networks:
  shared-network:
    driver: bridge
