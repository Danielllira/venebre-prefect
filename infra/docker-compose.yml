# Official Prefect 3.x Self-Hosted Documentation:
# https://docs.prefect.io/v3/deploy/infrastructure-examples/docker-compose

# Not using redis or prefect-services cuz: Cloud Run is responsible for the execution
# The single server handles everything, so we don't need them just to increase memory cost

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=prefect
      - POSTGRES_PASSWORD=prefect
      - POSTGRES_DB=prefect
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3.6.29-python3.13
    restart: always
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
      - PREFECT_API_URL=http://127.0.0.1:4200/api
    depends_on:
      postgres:
        condition: service_healthy

  worker-stg:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    command: prefect worker start --pool "cloud-run-stg" --type "cloud-run"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server

  worker-prod:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: always
    command: prefect worker start --pool "cloud-run-prod" --type "cloud-run"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    depends_on:
      - prefect-server

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    restart: always
    environment:
      OAUTH2_PROXY_PROVIDER: github
      OAUTH2_PROXY_CLIENT_ID: ${GITHUB_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_GITHUB_USERS: ${OAUTH_GITHUB_USERS}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_UPSTREAMS: "http://prefect-server:4200"
      OAUTH2_PROXY_SCOPE: "user:email read:org"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - prefect-server
      - oauth2-proxy

volumes:
  db_data:
