events {
    worker_connections 1024;
}

http {
    proxy_cache_path /tmp/nginx_auth_cache levels=1:2 keys_zone=auth_cache:10m max_size=50m inactive=10m;

    server {
        listen 80;
        server_name pipelines.venebre.com;

        # Rota de Login normal
        location /oauth2/ {
            proxy_pass http://oauth2-proxy:4180;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /oauth2/auth {
            proxy_pass http://oauth2-proxy:4180;
            proxy_set_header Host $host;
            
            # Não envia arquivos grandes pro detetive ler, só os cabeçalhos
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            
            # Regras de Cache: Memoriza o "Ok" por 5 minutos baseado no seu Cookie
            proxy_cache auth_cache;
            proxy_cache_key "$http_cookie";
            proxy_cache_valid 200 202 5m;
            proxy_cache_valid 401 403 0s; # Erros e bloqueios não ganham cache
        }

        location / {
            auth_request /oauth2/auth;
            error_page 401 = @oauth2_start;

            proxy_pass http://prefect-server:4200;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
        
        location @oauth2_start {
            return 302 /oauth2/start?rd=$request_uri;
        }
    }
}