events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name pipelines.venebre.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name pipelines.venebre.com;

        ssl_certificate /etc/letsencrypt/live/pipelines.venebre.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pipelines.venebre.com/privkey.pem;

        location / {
            auth_basic "Prefect";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://prefect-server:4200;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
