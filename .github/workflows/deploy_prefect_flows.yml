name: Deploy Prefect Flows

on:
  push:
    branches:
      - dev
      - main

jobs:
  build_runtime_image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      environment: ${{ steps.env_vars.outputs.environment }}
      image_name: ${{ steps.env_vars.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env_vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "gcp_project=venebre-dev" >> $GITHUB_OUTPUT
            echo "image_name=us-south1-docker.pkg.dev/venebre-dev/venebre-prefect/runtime:dev" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "gcp_project=venebre-prod" >> $GITHUB_OUTPUT
            echo "image_name=us-south1-docker.pkg.dev/venebre-prod/venebre-prefect/runtime:prod" >> $GITHUB_OUTPUT
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Validate GCP auth inputs (dev)
        if: github.ref_name == 'dev'
        env:
          GCP_WIF_PROVIDER_DEV: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          GCP_SERVICE_ACCOUNT_DEV: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER_DEV" ]; then
            echo "::error::GCP_WIF_PROVIDER_DEV is empty or unavailable"
            exit 1
          fi

          if [ -z "$GCP_SERVICE_ACCOUNT_DEV" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT_DEV is empty or unavailable"
            exit 1
          fi

          case "$GCP_WIF_PROVIDER_DEV" in
            projects/*/locations/global/workloadIdentityPools/*/providers/*)
              echo "Dev WIF provider format looks valid"
              ;;
            *)
              echo "::error::GCP_WIF_PROVIDER_DEV has unexpected format"
              exit 1
              ;;
          esac

          case "$GCP_SERVICE_ACCOUNT_DEV" in
            *@*.iam.gserviceaccount.com)
              echo "Dev service account format looks valid"
              ;;
            *)
              echo "::error::GCP_SERVICE_ACCOUNT_DEV has unexpected format"
              exit 1
              ;;
          esac

      - name: Validate GCP auth inputs (prod)
        if: github.ref_name == 'main'
        env:
          GCP_WIF_PROVIDER_PROD: ${{ secrets.GCP_WIF_PROVIDER_PROD }}
          GCP_SERVICE_ACCOUNT_PROD: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER_PROD" ]; then
            echo "::error::GCP_WIF_PROVIDER_PROD is empty or unavailable"
            exit 1
          fi

          if [ -z "$GCP_SERVICE_ACCOUNT_PROD" ]; then
            echo "::error::GCP_SERVICE_ACCOUNT_PROD is empty or unavailable"
            exit 1
          fi

          case "$GCP_WIF_PROVIDER_PROD" in
            projects/*/locations/global/workloadIdentityPools/*/providers/*)
              echo "Prod WIF provider format looks valid"
              ;;
            *)
              echo "::error::GCP_WIF_PROVIDER_PROD has unexpected format"
              exit 1
              ;;
          esac

          case "$GCP_SERVICE_ACCOUNT_PROD" in
            *@*.iam.gserviceaccount.com)
              echo "Prod service account format looks valid"
              ;;
            *)
              echo "::error::GCP_SERVICE_ACCOUNT_PROD has unexpected format"
              exit 1
              ;;
          esac

      - name: Authenticate to Google Cloud (dev)
        if: github.ref_name == 'dev'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}

      - name: Authenticate to Google Cloud (prod)
        if: github.ref_name == 'main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PROD }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-south1-docker.pkg.dev --quiet

      - name: Build runtime image
        run: |
          docker build -t ${{ steps.env_vars.outputs.image_name }} .

      - name: Push runtime image
        run: |
          docker push ${{ steps.env_vars.outputs.image_name }}

  deploy_changed_flows:
    runs-on: ubuntu-latest
    needs: build_runtime_image

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Deploy changed flows
        env:
          PREFECT_API_URL: https://pipelines.venebre.com/api
          PREFECT_API_AUTH_STRING: ${{ secrets.PREFECT_API_AUTH_STRING }}
        run: |
          uv run python -m scripts.deploy_changed_flows
