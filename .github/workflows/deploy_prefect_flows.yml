name: Deploy Prefect Flows

on:
  push:
    branches:
      - dev
      - main

jobs:
  build_runtime_image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    outputs:
      environment: ${{ steps.env_vars.outputs.environment }}
      image_name: ${{ steps.env_vars.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env_vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "gcp_project=venebre-dev" >> $GITHUB_OUTPUT
            echo "wif_provider=${{ secrets.GCP_WIF_PROVIDER_DEV }}" >> $GITHUB_OUTPUT
            echo "service_account=github-deployer@venebre-dev.iam.gserviceaccount.com" >> $GITHUB_OUTPUT
            echo "image_name=us-south1-docker.pkg.dev/venebre-dev/venebre-prefect/runtime:dev" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "gcp_project=venebre-prod" >> $GITHUB_OUTPUT
            echo "wif_provider=${{ secrets.GCP_WIF_PROVIDER_PROD }}" >> $GITHUB_OUTPUT
            echo "service_account=github-deployer@venebre-prod.iam.gserviceaccount.com" >> $GITHUB_OUTPUT
            echo "image_name=us-south1-docker.pkg.dev/venebre-prod/venebre-prefect/runtime:prod" >> $GITHUB_OUTPUT
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.env_vars.outputs.wif_provider }}
          service_account: ${{ steps.env_vars.outputs.service_account }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-south1-docker.pkg.dev --quiet

      - name: Build runtime image
        run: |
          docker build -t ${{ steps.env_vars.outputs.image_name }} .

      - name: Push runtime image
        run: |
          docker push ${{ steps.env_vars.outputs.image_name }}

  deploy_changed_flows:
    runs-on: ubuntu-latest
    needs: build_runtime_image

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Deploy changed flows
        env:
          PREFECT_API_URL: https://pipelines.venebre.com/api
          PREFECT_API_AUTH_STRING: ${{ secrets.PREFECT_API_AUTH_STRING }}
        run: |
          uv run python -m scripts.deploy_changed_flows