name: Deploy Infra

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy infra to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.GCP_VM_IP }}
          username: ${{ vars.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: "infra/*"
          target: "~/venebre-prefect"

      - name: Restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_VM_IP }}
          username: ${{ vars.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            cd ~/venebre-prefect
            docker compose -f infra/docker-compose.yml config > /dev/null
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            PREFECT_API_PASSWORD=${{ secrets.PREFECT_API_PASSWORD }} \
            docker compose -f infra/docker-compose.yml up -d --build --force-recreate
            docker image prune -f