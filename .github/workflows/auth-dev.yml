name: Auth Test - Dev

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  id-token: write

jobs:
  auth-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify authentication
        run: |
          gcloud config set project ${{ vars.GCP_PROJECT_ID_DEV }}
          gcloud auth list
          gcloud artifacts repositories list --location=${{ vars.GCP_REGION }}